# Docker compose for the recommendation-eval demo.
#
#   docker compose -f config/docker-compose.reco.yaml up --build
#
# Brings up:
#   - dashdoor  (Next.js, /reco-eval enabled via RECO_DEMO=1)
#   - gorse     (zhenghaoz/gorse-in-one, SQLite, dashboard on :8087, API on :8088)
#   - lightfm   (FastAPI sidecar, WARP-loss LightFM, port :8001)
#   - implicit  (FastAPI sidecar, ALS by default, port :8002)
#
# After Gorse is up, seed it with restaurants + order feedback:
#   scripts/n.sh npx tsx scripts/seed-gorse.ts
# The lightfm and implicit sidecars train themselves from the mounted
# SQLite on startup — no separate seed step.
#
# The dashdoor service reaches the sidecars over the compose network at
# http://{service}:{port}. The host can reach the dashboard at
# http://localhost:8087 and the eval UI at http://localhost:3000/reco-eval.

services:
  dashdoor:
    container_name: dashdoor_reco
    build:
      context: ..
      dockerfile: Dockerfile.prod
      args:
        RECO_DEMO: "1"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - RECO_DEMO=1
      - RECO_GORSE_URL=http://gorse:8088
      - RECO_LIGHTFM_URL=http://lightfm:8001/recommend
      - RECO_IMPLICIT_URL=http://implicit:8002/recommend
    depends_on:
      - gorse
      - lightfm
      - implicit
    restart: unless-stopped

  gorse:
    container_name: dashdoor_gorse
    image: zhenghaoz/gorse-in-one:latest
    ports:
      - "8087:8087"   # master / dashboard
      - "8088:8088"   # server / data REST API
    volumes:
      - gorse-data:/var/lib/gorse
    environment:
      - GORSE_CACHE_STORE=sqlite:///var/lib/gorse/cache.db
      - GORSE_DATA_STORE=sqlite:///var/lib/gorse/data.db
    restart: unless-stopped

  lightfm:
    container_name: dashdoor_lightfm
    build:
      context: ..
      dockerfile: tools/reco-engines/lightfm/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - LIBSQL_URL=file:/data/dashdoor.db
      - LIGHTFM_LOSS=warp
      - LIGHTFM_EPOCHS=30
    volumes:
      - ../data/db:/data:ro
    restart: unless-stopped

  implicit:
    container_name: dashdoor_implicit
    build:
      context: ..
      dockerfile: tools/reco-engines/implicit/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - LIBSQL_URL=file:/data/dashdoor.db
      - IMPLICIT_MODEL=als
      - IMPLICIT_FACTORS=64
      - IMPLICIT_ITERATIONS=15
    volumes:
      - ../data/db:/data:ro
    restart: unless-stopped

volumes:
  gorse-data:
