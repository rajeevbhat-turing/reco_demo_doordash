# Mounted into zhenghaoz/gorse-in-one at /etc/gorse/config.toml.
# Without this, positive_feedback_types is null and all seeded feedback is ignored.

[recommend.data_source]
positive_feedback_types = ["star"]
read_feedback_types = ["read"]

[recommend.collaborative]
type = "mf"
fit_period = "2m"
fit_epoch = 30

# Use CF scores directly; default FM ranker + "latest" candidates homogenize results.
[recommend.ranker]
type = "none"

[recommend.fallback]
recommenders = ["collaborative"]
